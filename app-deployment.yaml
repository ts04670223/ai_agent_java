apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: app
  name: app
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: app
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml
        kompose.version: 1.34.0 (cbf2835db)
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
      labels:
        io.kompose.service: app
    spec:
      containers:
        - env:
            - name: JAVA_OPTS
              value: -Dspring.data.redis.host=redis -Dspring.data.redis.port=6379 -Dspring.redis.host=redis -Dspring.redis.port=6379
            - name: SERVER_PORT
              value: "8080"
            - name: SPRING_DATASOURCE_PASSWORD
              value: springboot123
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/spring_boot_demo?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Taipei&allowPublicKeyRetrieval=true
            - name: SPRING_DATASOURCE_USERNAME
              value: springboot
            - name: SPRING_DATA_REDIS_HOST
              value: redis
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: update
            - name: SPRING_JPA_SHOW_SQL
              value: "true"
            - name: TZ
              value: Asia/Taipei
            - name: OLLAMA_BASE_URL
              value: http://192.168.10.10:11434
            - name: OLLAMA_MODEL
              value: qwen2.5:0.5b
          image: vagrant-app:latest
          imagePullPolicy: Never
          # 存活檢查 - 檢測應用是否還在運行
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          # 就緒檢查 - 確保應用完全就緒後才接收流量
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          # 啟動探針 - 給應用更多時間完成初始化
          # initialDelaySeconds=60: 等 Flannel + Spring Boot 初始化
          # failureThreshold=36: 最多等 36×10=360 秒才判定失敗
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 36
          # 資源限制 - 防止資源耗盡
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          name: spring-boot-app
          ports:
            - containerPort: 8080
              protocol: TCP
          volumeMounts:
            - mountPath: /app/logs
              name: app-cm0
            - mountPath: /app/app.jar
              name: app-jar
              subPath: spring-boot-demo-0.0.1-SNAPSHOT.jar
      restartPolicy: Always
      volumes:
        - configMap:
            name: app-cm0
          name: app-cm0
        - name: app-jar
          hostPath:
            path: /vagrant/target
            type: Directory
