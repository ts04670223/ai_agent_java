apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-mysql-data
spec:
  capacity:
    storage: 8Gi          # 依你的 PVC 大小調整，通常 kompose 預設 8Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""    # 如果 PVC 沒指定 storageClass，就留空
  hostPath:
    path: /data/mysql
---
