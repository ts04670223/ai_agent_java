<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天系統</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            overflow: hidden;
        }

        .sidebar {
            width: 300px;
            background: #f8f9fa;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            background: #667eea;
            color: white;
        }

        .sidebar-header h2 {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .user-select {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-select label {
            font-size: 14px;
        }

        .user-select select {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 5px;
            background: white;
            font-size: 14px;
        }

        .contacts {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .contact-item {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 5px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .contact-item:hover {
            background: #e9ecef;
        }

        .contact-item.active {
            background: #667eea;
            color: white;
        }

        .contact-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #667eea;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .contact-item.active .contact-avatar {
            background: white;
            color: #667eea;
        }

        .contact-info {
            flex: 1;
        }

        .contact-name {
            font-weight: 500;
            margin-bottom: 3px;
        }

        .contact-status {
            font-size: 12px;
            opacity: 0.7;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 20px;
            background: white;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .chat-header-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #667eea;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
        }

        .chat-header-info h3 {
            font-size: 18px;
            margin-bottom: 3px;
        }

        .chat-header-info p {
            font-size: 13px;
            color: #6c757d;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            display: flex;
            margin-bottom: 15px;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.sent {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 15px;
            position: relative;
        }

        .message.received .message-content {
            background: white;
            border-bottom-left-radius: 5px;
        }

        .message.sent .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 5px;
        }

        .message-text {
            word-wrap: break-word;
            margin-bottom: 5px;
        }

        .message-time {
            font-size: 11px;
            opacity: 0.7;
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-area input:focus {
            border-color: #667eea;
        }

        .input-area button {
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }

        .input-area button:hover {
            background: #5568d3;
        }

        .input-area button:active {
            transform: scale(0.98);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #6c757d;
        }

        .empty-state-icon {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .empty-state-text {
            font-size: 18px;
        }

        .badge {
            background: #dc3545;
            color: white;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 側邊欄 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>聊天系統</h2>
                <div class="user-select">
                    <label>當前用戶:</label>
                    <select id="currentUser" onchange="switchUser()">
                        <option value="1">用戶 1</option>
                        <option value="2">用戶 2</option>
                        <option value="3">用戶 3</option>
                        <option value="4">用戶 4</option>
                        <option value="5">用戶 5</option>
                    </select>
                </div>
            </div>
            <div class="contacts" id="contactsList">
                <!-- 聯絡人列表將動態生成 -->
            </div>
        </div>

        <!-- 聊天區域 -->
        <div class="chat-area">
            <div class="chat-header" id="chatHeader" style="display: none;">
                <div class="chat-header-avatar" id="chatAvatar">U</div>
                <div class="chat-header-info">
                    <h3 id="chatUsername">選擇一個聯絡人</h3>
                    <p id="chatStatus">在線</p>
                </div>
            </div>
            
            <div class="messages-container" id="messagesContainer">
                <div class="empty-state">
                    <div class="empty-state-icon">💬</div>
                    <div class="empty-state-text">選擇一個聯絡人開始聊天</div>
                </div>
            </div>

            <div class="input-area" id="inputArea" style="display: none;">
                <input type="text" id="messageInput" placeholder="輸入訊息..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()">發送</button>
            </div>
        </div>
    </div>

    <script>
        let currentUserId = 1;
        let selectedUserId = null;
        let lastMessageCount = 0;
        let currentMessages = [];
        const API_BASE = '/api/chat';

        // 初始化
        function init() {
            loadContacts();
            setInterval(refreshMessages, 3000); // 每3秒刷新訊息
        }

        // 切換當前用戶
        function switchUser() {
            currentUserId = parseInt(document.getElementById('currentUser').value);
            selectedUserId = null;
            lastMessageCount = 0;
            currentMessages = [];
            loadContacts();
            showEmptyState();
        }

        // 載入聯絡人列表
        function loadContacts() {
            const contactsList = document.getElementById('contactsList');
            contactsList.innerHTML = '';
            
            // 生成其他用戶作為聯絡人
            for (let i = 1; i <= 5; i++) {
                if (i !== currentUserId) {
                    const contact = createContactElement(i);
                    contactsList.appendChild(contact);
                }
            }
        }

        // 建立聯絡人元素
        function createContactElement(userId) {
            const div = document.createElement('div');
            div.className = 'contact-item';
            div.onclick = () => selectContact(userId);
            
            div.innerHTML = `
                <div class="contact-avatar">U${userId}</div>
                <div class="contact-info">
                    <div class="contact-name">用戶 ${userId}</div>
                    <div class="contact-status">在線</div>
                </div>
                <span class="badge" id="badge-${userId}" style="display: none;">0</span>
            `;
            
            return div;
        }

        // 選擇聯絡人
        function selectContact(userId) {
            selectedUserId = userId;
            lastMessageCount = 0;
            currentMessages = [];
            
            // 更新選中狀態
            document.querySelectorAll('.contact-item').forEach(item => {
                item.classList.remove('active');
            });
            event.currentTarget.classList.add('active');
            
            // 更新聊天標題
            document.getElementById('chatHeader').style.display = 'flex';
            document.getElementById('chatAvatar').textContent = 'U' + userId;
            document.getElementById('chatUsername').textContent = '用戶 ' + userId;
            document.getElementById('inputArea').style.display = 'flex';
            
            // 載入聊天記錄
            loadMessages();
        }

        // 載入聊天訊息
        async function loadMessages() {
            if (!selectedUserId) return;
            
            try {
                const response = await fetch(`${API_BASE}/history?user1=${currentUserId}&user2=${selectedUserId}`);
                const messages = await response.json();
                
                // 只有在訊息數量變化時才更新畫面
                if (messages.length !== lastMessageCount) {
                    currentMessages = messages;
                    lastMessageCount = messages.length;
                    displayMessages(messages);
                }
                
                // 標記為已讀
                await fetch(`${API_BASE}/read-chat?receiverId=${currentUserId}&senderId=${selectedUserId}`, {
                    method: 'PUT'
                });
                
                // 更新未讀計數
                updateUnreadBadge(selectedUserId, 0);
            } catch (error) {
                console.error('載入訊息失敗:', error);
            }
        }

        // 顯示訊息
        function displayMessages(messages) {
            const container = document.getElementById('messagesContainer');
            const shouldScroll = container.scrollHeight - container.scrollTop === container.clientHeight;
            
            container.innerHTML = '';
            
            messages.forEach(msg => {
                const messageDiv = createMessageElement(msg);
                container.appendChild(messageDiv);
            });
            
            // 只在原本就在底部時才自動滾動
            if (shouldScroll || lastMessageCount === messages.length) {
                container.scrollTop = container.scrollHeight;
            }
        }

        // 建立訊息元素
        function createMessageElement(msg) {
            const div = document.createElement('div');
            div.className = msg.senderId === currentUserId ? 'message sent' : 'message received';
            
            const time = new Date(msg.timestamp).toLocaleTimeString('zh-TW', {
                hour: '2-digit',
                minute: '2-digit'
            });
            
            div.innerHTML = `
                <div class="message-content">
                    <div class="message-text">${escapeHtml(msg.message)}</div>
                    <div class="message-time">${time}</div>
                </div>
            `;
            
            return div;
        }

        // 發送訊息
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message || !selectedUserId) return;
            
            try {
                const response = await fetch(`${API_BASE}/send`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        senderId: currentUserId,
                        receiverId: selectedUserId,
                        message: message
                    })
                });
                
                if (response.ok) {
                    input.value = '';
                    // 重置計數器以強制更新
                    lastMessageCount = 0;
                    await loadMessages();
                } else {
                    alert('發送失敗');
                }
            } catch (error) {
                console.error('發送訊息失敗:', error);
                alert('發送失敗: ' + error.message);
            }
        }

        // 處理 Enter 鍵
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // 刷新訊息
        function refreshMessages() {
            if (selectedUserId) {
                loadMessages();
            }
            loadUnreadCounts();
        }

        // 載入未讀計數
        async function loadUnreadCounts() {
            for (let i = 1; i <= 5; i++) {
                if (i !== currentUserId) {
                    try {
                        const response = await fetch(`${API_BASE}/history?user1=${currentUserId}&user2=${i}`);
                        const messages = await response.json();
                        const unreadCount = messages.filter(m => 
                            m.receiverId === currentUserId && !m.isRead
                        ).length;
                        updateUnreadBadge(i, unreadCount);
                    } catch (error) {
                        console.error('載入未讀計數失敗:', error);
                    }
                }
            }
        }

        // 更新未讀標記
        function updateUnreadBadge(userId, count) {
            const badge = document.getElementById(`badge-${userId}`);
            if (badge) {
                if (count > 0) {
                    badge.textContent = count;
                    badge.style.display = 'block';
                } else {
                    badge.style.display = 'none';
                }
            }
        }

        // 顯示空白狀態
        function showEmptyState() {
            document.getElementById('chatHeader').style.display = 'none';
            document.getElementById('inputArea').style.display = 'none';
            document.getElementById('messagesContainer').innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">💬</div>
                    <div class="empty-state-text">選擇一個聯絡人開始聊天</div>
                </div>
            `;
        }

        // HTML 轉義
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 頁面載入時初始化
        window.onload = init;
    </script>
</body>
</html>
